# Coolify Nixpacks ile derlenirse (varsayılan). Laravel 13 için PHP 8.3 zorunludur.
# ÖNERİLEN: Coolify → Configuration → Build → Build Pack = Dockerfile, Port = 8080

[variables]
NIXPACKS_PHP_VERSION = "8.3"
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction --ignore-platform-reqs",
    "npm ci --ignore-scripts",
    "npm run build",
]

[phases.build]
cmds = [
    "mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/app/public bootstrap/cache",
]

[start]
cmd = "php artisan package:discover --ansi && php artisan storage:link --force 2>/dev/null || true && php artisan optimize && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
